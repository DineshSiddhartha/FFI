<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="100%" style="stop-color:#FFB800"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#sunGrad)"/>
  <!-- Sun circle -->
  <circle cx="50" cy="45" r="18" fill="white" opacity="0.95"/>
  <!-- Sun rays -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.8">
    <line x1="50" y1="18" x2="50" y2="10"/>
    <line x1="50" y1="72" x2="50" y2="80"/>
    <line x1="23" y1="45" x2="15" y2="45"/>
    <line x1="77" y1="45" x2="85" y2="45"/>
    <line x1="31" y1="26" x2="25" y2="20"/>
    <line x1="69" y1="64" x2="75" y2="70"/>
    <line x1="69" y1="26" x2="75" y2="20"/>
    <line x1="31" y1="64" x2="25" y2="70"/>
  </g>
  <!-- Solar panel symbol at bottom -->
  <rect x="25" y="72" width="50" height="18" rx="3" fill="white" opacity="0.9"/>
  <line x1="50" y1="72" x2="50" y2="90" stroke="#FF6B00" stroke-width="2"/>
  <line x1="25" y1="81" x2="75" y2="81" stroke="#FF6B00" stroke-width="2"/>
</svg>